<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Source Scripts</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
button{font-family:inherit;cursor:pointer;}

:root{
  --bg:        #0d0d0f;
  --bg-card:   #13131a;
  --bg-hover:  #1a1a24;
  --bg-glass:  rgba(255,255,255,0.04);
  --border:    rgba(255,255,255,0.07);
  --border-hi: rgba(255,255,255,0.14);
  --accent:    #7c6bff;
  --accent2:   #ff6b9d;
  --glow:      rgba(124,107,255,0.25);
  --txt:       #f0f0f5;
  --txt-dim:   #7a7a8c;
  --txt-faint: #2e2e3a;
  --success:   #4ade80;
  --mono:      'JetBrains Mono',monospace;
  --sans:      'Syne',sans-serif;
}

html,body{
  background:var(--bg);color:var(--txt);
  font-family:var(--sans);min-height:100vh;
}

::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:3px;}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:100;height:60px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  background:rgba(13,13,15,0.88);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
}
.hdr{
  max-width:1200px;margin:0 auto;padding:0 28px;
  width:100%;display:flex;align-items:center;justify-content:space-between;
}
.logo{
  font-family:var(--sans);font-weight:800;font-size:1rem;
  color:var(--txt);background:none;border:none;
  display:flex;align-items:center;gap:10px;
}
.logo-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 10px var(--accent);
  animation:ldot 2s ease-in-out infinite;
}
@keyframes ldot{0%,100%{box-shadow:0 0 8px var(--accent);}50%{box-shadow:0 0 18px var(--accent),0 0 30px var(--glow);}}

.hdr-right{
  display:flex;align-items:center;gap:12px;
}
.fb-pill{
  display:inline-flex;align-items:center;gap:6px;
  font-family:var(--mono);font-size:.6rem;letter-spacing:1px;
  padding:4px 10px;border-radius:100px;
  border:1px solid var(--border);color:var(--txt-dim);
}
.fb-dot{width:6px;height:6px;border-radius:50%;}
.fb-dot.ok{background:var(--success);box-shadow:0 0 6px var(--success);}
.fb-dot.no{background:#f87171;box-shadow:0 0 6px #f87171;}
.fb-dot.loading{background:#facc15;box-shadow:0 0 6px #facc15;animation:blink .8s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

/* ── PAGE TOP ── */
.page-top{
  max-width:1200px;margin:0 auto;
  padding:44px 28px 28px;
  display:flex;align-items:flex-end;justify-content:space-between;
  flex-wrap:wrap;gap:16px;
}
.page-title{
  font-size:2.2rem;font-weight:800;letter-spacing:-1px;
  background:linear-gradient(135deg,#fff,#a0a0c0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.page-count{
  font-family:var(--mono);font-size:.7rem;
  color:var(--txt-dim);letter-spacing:1px;margin-top:6px;
}

/* ── GRID ── */
.grid-wrap{
  max-width:1200px;margin:0 auto;
  padding:0 28px 60px;
}
.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
  gap:20px;
}

/* ── CARD ── */
.card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:16px;overflow:hidden;
  cursor:pointer;display:flex;flex-direction:column;
  position:relative;
  transition:border-color .2s,transform .2s,box-shadow .2s;
}
.card:hover{
  transform:translateY(-4px);
  box-shadow:0 16px 48px rgba(0,0,0,.4),0 0 0 1px rgba(124,107,255,.2);
  border-color:rgba(124,107,255,.3);
}
.card-thumb{
  width:100%;aspect-ratio:16/9;
  overflow:hidden;background:var(--bg-hover);position:relative;flex-shrink:0;
}
.card-thumb img{
  width:100%;height:100%;object-fit:cover;display:block;
  filter:brightness(.6) saturate(.7);
  transition:filter .3s,transform .35s;
}
.card:hover .card-thumb img{filter:brightness(.85) saturate(1);transform:scale(1.05);}
.card-shade{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 50%,rgba(13,13,15,.9));
}
.c-badge{
  position:absolute;bottom:10px;left:12px;
  font-family:var(--mono);font-size:.58rem;
  letter-spacing:2px;text-transform:uppercase;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;padding:3px 10px;border-radius:100px;
}
.card-body{
  padding:18px 20px 20px;flex:1;
  display:flex;flex-direction:column;gap:7px;
}
.c-name{font-size:.95rem;font-weight:700;color:var(--txt);line-height:1.3;}
.c-desc{font-size:.78rem;color:var(--txt-dim);line-height:1.65;flex:1;}
.c-foot{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:12px;margin-top:4px;
  border-top:1px solid var(--border);
}
.c-lang{font-family:var(--mono);font-size:.6rem;color:var(--txt-faint);letter-spacing:1px;text-transform:uppercase;}
.c-arr{
  width:28px;height:28px;border-radius:8px;
  background:var(--bg-glass);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,transform .15s,border-color .15s;
}
.card:hover .c-arr{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-color:transparent;transform:rotate(-45deg);
}
.c-arr svg{width:13px;height:13px;color:var(--txt-dim);}
.card:hover .c-arr svg{color:#fff;}

/* ── EMPTY / LOADING ── */
.state-box{
  grid-column:1/-1;
  padding:80px 24px;text-align:center;
}
.state-icon{font-size:3rem;margin-bottom:16px;}
.state-title{font-size:1.1rem;font-weight:700;color:var(--txt);margin-bottom:8px;}
.state-sub{font-size:.85rem;color:var(--txt-dim);}
.spinner{
  display:inline-block;
  width:36px;height:36px;
  border:3px solid var(--border-hi);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .7s linear infinite;
  margin-bottom:16px;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* card appear */
.card{animation:cup .35s ease both;}
@keyframes cup{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

/* ── MODAL ── */
.modal-bg{
  display:none;position:fixed;inset:0;z-index:400;
  background:rgba(0,0,0,.85);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  align-items:center;justify-content:center;padding:24px;
  overflow-y:auto;
}
.modal-bg.on{display:flex;animation:mfade .18s ease;}
@keyframes mfade{from{opacity:0;}to{opacity:1;}}
.m-box{
  background:var(--bg-card);border:1px solid var(--border-hi);
  border-radius:20px;max-width:680px;width:100%;
  position:relative;flex-shrink:0;
  max-height:90vh;overflow-y:auto;
}
.m-img{
  width:100%;aspect-ratio:16/9;object-fit:cover;display:block;
  filter:brightness(.55) saturate(.6);border-radius:20px 20px 0 0;
}
.m-close{
  position:absolute;top:12px;right:12px;
  width:32px;height:32px;border-radius:10px;
  background:rgba(13,13,15,.8);backdrop-filter:blur(8px);
  border:1px solid var(--border-hi);color:var(--txt);font-size:.82rem;
  display:flex;align-items:center;justify-content:center;
  transition:background .12s;
}
.m-close:hover{background:#f87171;color:#fff;}
.m-body{padding:26px;}
.m-tag{
  display:inline-block;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-family:var(--mono);font-size:.6rem;
  letter-spacing:2px;text-transform:uppercase;
  padding:3px 12px;border-radius:100px;margin-bottom:14px;
}
.m-title{font-size:1.5rem;font-weight:800;color:var(--txt);letter-spacing:-.5px;margin-bottom:8px;}
.m-desc{font-size:.875rem;color:var(--txt-dim);line-height:1.75;margin-bottom:22px;}
.m-lbl{
  font-family:var(--mono);font-size:.6rem;letter-spacing:2px;
  text-transform:uppercase;color:var(--txt-faint);margin-bottom:8px;
  display:flex;align-items:center;gap:8px;
}
.m-lbl::after{content:'';flex:1;height:1px;background:var(--border);}
.m-code{
  background:#090910;border:1px solid var(--border);
  border-radius:12px;padding:18px;
  font-family:var(--mono);font-size:.76rem;
  color:#a78bfa;line-height:1.7;overflow-x:auto;white-space:pre;display:block;
}
.m-copy{
  margin-top:14px;
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--sans);font-size:.82rem;font-weight:700;
  background:var(--bg-glass);border:1px solid var(--border-hi);
  color:var(--txt);padding:10px 22px;border-radius:10px;
  transition:background .15s,border-color .15s;
}
.m-copy:hover{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;}
.m-copy svg{width:14px;height:14px;}

/* ── FOOTER ── */
footer{
  border-top:1px solid var(--border);
  padding:20px 28px;
  font-family:var(--mono);font-size:.62rem;
  color:var(--txt-faint);letter-spacing:1px;
  max-width:1200px;margin:0 auto;
}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <div class="logo">
      <span class="logo-dot"></span>
      Source Scripts
    </div>
    <div class="hdr-right">
      <span class="fb-pill">
        <span class="fb-dot loading" id="fbDot"></span>
        <span id="fbLabel">Connecting…</span>
      </span>
    </div>
  </div>
</header>

<div class="page-top">
  <div>
    <div class="page-title">Script Sources</div>
    <div class="page-count" id="pageCount">Loading…</div>
  </div>
</div>

<div class="grid-wrap">
  <div class="cards-grid" id="cardsGrid">
    <div class="state-box">
      <div class="spinner"></div>
      <div class="state-title">Loading scripts…</div>
    </div>
  </div>
</div>

<footer>© 2025 Source Scripts</footer>

<!-- MODAL -->
<div class="modal-bg" id="modal" onclick="closeMBg(event)">
  <div class="m-box" onclick="event.stopPropagation()">
    <img class="m-img" id="mImg" src="" alt=""/>
    <button class="m-close" onclick="closeModal()">✕</button>
    <div class="m-body">
      <div class="m-tag" id="mTag"></div>
      <div class="m-title" id="mTitle"></div>
      <div class="m-desc" id="mDesc"></div>
      <div class="m-lbl">Source Code</div>
      <pre class="m-code" id="mCode"></pre>
      <button class="m-copy" onclick="doCopy()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
        <span id="copyTxt">Copy Code</span>
      </button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs, orderBy, query }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const _c = "eyJhcGlLZXkiOiJBSXphU3lBbkQ0ZzdlcDgtNHBOT1lqTkZXT3FvaTYtdmZqY3RqVEEiLCJhdXRoRG9tYWluIjoicG9kc2x1aGFubzE4c2Nob29sLmZpcmViYXNlYXBwLmNvbSIsImRhdGFiYXNlVVJMIjoiaHR0cHM6Ly9wb2RzbHVoYW5vMThzY2hvb2wtZGVmYXVsdC1ydGRiLmV1cm9wZS13ZXN0MS5maXJlYmFzZWRhdGFiYXNlLmFwcCIsInByb2plY3RJZCI6InBvZHNsdWhhbm8xOHNjaG9vbCIsInN0b3JhZ2VCdWNrZXQiOiJwb2RzbHVoYW5vMThzY2hvb2wuZmlyZWJhc2VzdG9yYWdlLmFwcCIsIm1lc3NhZ2luZ1NlbmRlcklkIjoiMzc4Njc3Mjg0MjM3IiwiYXBwSWQiOiIxOjM3ODY3NzI4NDIzNzp3ZWI6NGE3MTNmY2ZiOTA4MjE5M2UwMDFjNCIsIm1lYXN1cmVtZW50SWQiOiJHLVIxMVFDN0tDUVQifQ==";

  try {
    const app = initializeApp(JSON.parse(atob(_c)));
    const db  = getFirestore(app);

    const q    = query(collection(db, "scripts"), orderBy("createdAt", "desc"));
    const snap = await getDocs(q);
    const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    // Signal success to main script
    window._fbData = list;
    window._fbDone = true;

  } catch(e) {
    console.warn("Firebase error:", e);
    window._fbData = [];
    window._fbDone = true;
    window._fbErr  = true;
  }
</script>

<!-- Main Script -->
<script>
var FALLBACK = 'https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=600&q=60';

/* Poll until Firebase module finishes, then render */
function waitAndRender() {
  if (window._fbDone === true) {
    updateStatus();
    renderGrid(window._fbData || []);
    return;
  }
  setTimeout(waitAndRender, 150);
}

function updateStatus() {
  var dot = document.getElementById('fbDot');
  var lbl = document.getElementById('fbLabel');
  if (window._fbErr) {
    dot.className = 'fb-dot no';
    lbl.textContent = 'Offline';
  } else {
    dot.className = 'fb-dot ok';
    lbl.textContent = 'Firebase';
  }
}

function renderGrid(list) {
  var grid  = document.getElementById('cardsGrid');
  var count = document.getElementById('pageCount');

  grid.innerHTML = '';

  if (!list || list.length === 0) {
    grid.innerHTML =
      '<div class="state-box">' +
        '<div class="state-icon">📭</div>' +
        '<div class="state-title">No scripts yet</div>' +
        '<div class="state-sub">The admin hasn\'t added any scripts.</div>' +
      '</div>';
    count.textContent = '0 scripts';
    return;
  }

  count.textContent = list.length + ' script' + (list.length === 1 ? '' : 's');

  list.forEach(function(item, i) {
    var img  = (item.img && item.img.trim()) ? item.img : FALLBACK;
    var card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = Math.min(i * 0.055, 0.5) + 's';
    card.innerHTML =
      '<div class="card-thumb">' +
        '<img src="' + img + '" alt="" loading="lazy" onerror="this.src=\'' + FALLBACK + '\'"/>' +
        '<div class="card-shade"></div>' +
        '<span class="c-badge">' + x(item.tag || 'Luau') + '</span>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="c-name">' + x(item.title) + '</div>' +
        '<div class="c-desc">' + x(item.desc) + '</div>' +
        '<div class="c-foot">' +
          '<span class="c-lang">' + x(item.lang || 'luau') + '</span>' +
          '<span class="c-arr">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">' +
              '<line x1="5" y1="12" x2="19" y2="12"/>' +
              '<polyline points="12 5 19 12 12 19"/>' +
            '</svg>' +
          '</span>' +
        '</div>' +
      '</div>';
    card.addEventListener('click', function() { openModal(item); });
    grid.appendChild(card);
  });
}

function x(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* Modal */
var _src = '';
function openModal(item) {
  _src = item.src || '';
  document.getElementById('mImg').src = (item.img && item.img.trim()) ? item.img : FALLBACK;
  document.getElementById('mTag').textContent   = item.tag || 'Luau';
  document.getElementById('mTitle').textContent = item.title || '';
  document.getElementById('mDesc').textContent  = item.desc  || '';
  document.getElementById('mCode').textContent  = item.src   || '';
  document.getElementById('copyTxt').textContent = 'Copy Code';
  document.getElementById('modal').classList.add('on');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal').classList.remove('on');
  document.body.style.overflow = '';
}
function closeMBg(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}
function doCopy() {
  var btn = document.getElementById('copyTxt');
  function ok() {
    btn.textContent = 'Copied!';
    setTimeout(function(){ btn.textContent = 'Copy Code'; }, 2000);
  }
  if (navigator.clipboard && _src) {
    navigator.clipboard.writeText(_src).then(ok).catch(fb);
  } else { fb(); ok(); }
  function fb() {
    var t = document.createElement('textarea');
    t.value = _src; t.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(t); t.select();
    document.execCommand('copy'); document.body.removeChild(t);
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

/* Start */
waitAndRender();
</script>
</body>
</html>
